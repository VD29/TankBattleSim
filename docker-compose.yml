services:
  postgres:
    image: postgres:15-alpine
    container_name: tanksim_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tanksim
      POSTGRES_USER: tanksim
      POSTGRES_PASSWORD: tanksim_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tanksim -d tanksim"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tanksim_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: tanksim
      RABBITMQ_DEFAULT_PASS: tanksim_secret
      RABBITMQ_DEFAULT_VHOST: tanksim
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
